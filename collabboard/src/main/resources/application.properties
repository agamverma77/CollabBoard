spring.application.name=Collabboard
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.config.import=optional:classpath:application-local.properties
# ===============================================
# POSTGRESQL DATABASE CONFIGURATION
# ===============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/collabboard_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===============================================
# JPA / HIBERNATE SETTINGS
# ===============================================
# This tells Hibernate to update the database schema (e.g., create tables) on startup
spring.jpa.hibernate.ddl-auto=update

# This tells Hibernate which SQL dialect to use for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#===============================================
#EMAIL SENDER CONFIGURATION (GMAIL)
#===============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:change_me@example.com}

#IMPORTANT: Use a Google "App Password" here, NOT your regular password.
spring.mail.password=${MAIL_PASSWORD:change_me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true